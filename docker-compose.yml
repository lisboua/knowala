services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://knowala:knowala@db:5432/knowala
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - knowala-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knowala
      POSTGRES_PASSWORD: knowala
      POSTGRES_DB: knowala
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowala"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - knowala-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - knowala-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  knowala-net:
    driver: bridge
